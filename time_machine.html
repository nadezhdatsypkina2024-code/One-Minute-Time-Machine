<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Одноминутная Машина Времени</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --sky: #87CEEB;
    --grass: #5db85d;
    --grass-dark: #3d8b3d;
    --red: #e63946;
    --red-dark: #c1121f;
    --yellow: #ffd166;
    --white: #fffdf7;
    --dark: #1a1a2e;
    --grey: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
    position: relative;
  }

  .sky-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #b8e4f7 0%, #d4effc 60%, #e8f8ff 100%);
    z-index: 0;
  }

  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    animation: cloudDrift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 36px; top: 8%; left: -130px; animation-duration: 28s; }
  .cloud-1::before { width: 56px; height: 56px; top: -28px; left: 18px; }
  .cloud-1::after { width: 36px; height: 36px; top: -18px; left: 54px; }
  .cloud-2 { width: 90px; height: 28px; top: 18%; left: -100px; animation-duration: 38s; animation-delay: -12s; }
  .cloud-2::before { width: 42px; height: 42px; top: -22px; left: 12px; }
  .cloud-2::after { width: 28px; height: 28px; top: -14px; left: 42px; }
  .cloud-3 { width: 70px; height: 22px; top: 6%; left: -80px; animation-duration: 50s; animation-delay: -24s; opacity: 0.6; }
  .cloud-3::before { width: 32px; height: 32px; top: -16px; left: 10px; }

  @keyframes cloudDrift {
    from { left: -160px; }
    to { left: 110vw; }
  }

  .sun {
    position: fixed;
    top: 6%;
    right: 8%;
    width: 70px;
    height: 70px;
    background: var(--yellow);
    border-radius: 50%;
    box-shadow: 0 0 0 12px rgba(255,209,102,0.25), 0 0 0 24px rgba(255,209,102,0.1);
    z-index: 1;
    animation: sunPulse 4s ease-in-out infinite;
  }

  @keyframes sunPulse {
    0%, 100% { box-shadow: 0 0 0 12px rgba(255,209,102,0.25), 0 0 0 24px rgba(255,209,102,0.1); }
    50% { box-shadow: 0 0 0 18px rgba(255,209,102,0.3), 0 0 0 36px rgba(255,209,102,0.12); }
  }

  .grass {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(180deg, var(--grass) 0%, var(--grass-dark) 100%);
    z-index: 1;
    border-radius: 60% 60% 0 0 / 20px 20px 0 0;
  }

  .grass-blades {
    position: absolute;
    top: -18px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
  }

  .blade {
    width: 6px;
    height: 22px;
    background: var(--grass);
    border-radius: 3px 3px 0 0;
    transform-origin: bottom center;
    animation: sway 2.5s ease-in-out infinite;
  }
  .blade:nth-child(2n) { animation-delay: -0.8s; height: 18px; }
  .blade:nth-child(3n) { animation-delay: -1.5s; height: 26px; background: #4ca84c; }

  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }

  .scene {
    position: relative;
    z-index: 10;
    width: min(440px, 92vw);
    padding-bottom: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .title-block {
    text-align: center;
    animation: bounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 8vw, 3rem);
    color: var(--dark);
    letter-spacing: 0.06em;
    line-height: 1;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.12);
  }

  .title span { color: var(--red); }

  .subtitle {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dark);
    opacity: 0.45;
    margin-top: 0.3rem;
  }

  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 1.6rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
    width: 100%;
    animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    position: relative;
    border: 3px solid rgba(0,0,0,0.06);
  }

  .uses-badge {
    position: absolute;
    top: -13px;
    right: 16px;
    background: var(--dark);
    color: var(--yellow);
    font-size: 0.62rem;
    font-weight: 800;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    background: #f0ede6;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.2rem;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 0.45rem;
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    background: transparent;
    color: var(--grey);
    transition: all 0.2s ease;
  }

  .tab.active {
    background: white;
    color: var(--dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .label {
    font-size: 0.62rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--grey);
    margin-bottom: 0.5rem;
  }

  .phrase-box {
    background: #f7f4ee;
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--dark);
    min-height: 3rem;
    border: 2px solid transparent;
    transition: all 0.3s ease;
  }

  .phrase-box.struck {
    text-decoration: line-through;
    opacity: 0.38;
    background: #ece9e2;
  }

  .phrase-box.result-box {
    background: #e8f8e8;
    border-color: var(--grass);
    color: #1a4a1a;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .arrow-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.45rem 0;
    font-size: 1.1rem;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .arrow-row.visible { opacity: 1; }

  .special-moment {
    background: linear-gradient(135deg, #fff9e6, #fff3cc);
    border: 2px solid var(--yellow);
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    text-align: center;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    margin-top: 0.2rem;
  }
  .special-moment.visible { display: block; }
  .special-emoji { font-size: 1.8rem; margin-bottom: 0.4rem; }
  .special-text {
    font-size: 1rem;
    font-weight: 800;
    color: #7a4f00;
    line-height: 1.4;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.4rem;
  }

  .big-button {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff6b6b, var(--red) 50%, var(--red-dark));
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--red-dark), 0 10px 20px rgba(230,57,70,0.4), inset 0 2px 4px rgba(255,255,255,0.3);
    transition: all 0.1s ease;
    position: relative;
    animation: buttonBob 2s ease-in-out infinite;
  }

  .big-button::after {
    content: '⏱';
    font-size: 1.9rem;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }

  .big-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 11px 0 var(--red-dark), 0 14px 24px rgba(230,57,70,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
  }

  .big-button.pressed {
    transform: translateY(6px) !important;
    box-shadow: 0 2px 0 var(--red-dark), 0 4px 10px rgba(230,57,70,0.3), inset 0 2px 4px rgba(255,255,255,0.3);
    animation: none;
  }

  @keyframes buttonBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .btn-label {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dark);
    opacity: 0.45;
  }

  .reset-btn {
    background: none;
    border: 2px solid rgba(0,0,0,0.15);
    border-radius: 20px;
    padding: 0.38rem 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--grey);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: none;
    transition: all 0.2s;
    margin-top: 0.2rem;
  }
  .reset-btn:hover { border-color: var(--grey); color: var(--dark); }

  .custom-input {
    width: 100%;
    background: #f7f4ee;
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--dark);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .custom-input:focus { border-color: #87ceeb; }
  .custom-input::placeholder { opacity: 0.35; font-weight: 400; }

  .flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.08s ease;
  }
  .flash.on { opacity: 0.65; }

  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    font-size: 1.3rem;
    animation: sparkleAnim 0.9s ease forwards;
  }

  @keyframes sparkleAnim {
    0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.4) rotate(var(--dr)); opacity: 0; }
  }

  @keyframes bounceIn {
    from { opacity: 0; transform: scale(0.7) translateY(-20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .shake { animation: shake 0.35s ease; }

  .r-hidden { display: none; }
  .r-visible { display: block; }
</style>
</head>
<body>

<div class="sky-bg"></div>
<div class="sun"></div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>
<div class="flash" id="flash"></div>

<div class="scene">

  <div class="title-block">
    <div class="title">Одноминутная<br><span>Машина Времени</span></div>
    <div class="subtitle">нажми кнопку — переиграй момент</div>
  </div>

  <div class="card">
    <div class="uses-badge" id="uses-badge">перемоток: 0</div>

    <div class="tabs">
      <button class="tab active" onclick="setMode('classic')" id="tab-classic">классика</button>
      <button class="tab" onclick="setMode('custom')" id="tab-custom">своя фраза</button>
    </div>

    <!-- CLASSIC -->
    <div id="classic-mode">
      <div class="label">что было сказано</div>
      <div class="phrase-box" id="original-box">недотрах</div>
      <div class="arrow-row" id="arrow-row">⬇️</div>
      <div class="r-hidden" id="result-wrap">
        <div class="label">что хотелось сказать</div>
        <div class="phrase-box result-box" id="result-box"></div>
      </div>
      <div class="special-moment" id="special-moment">
        <div class="special-emoji">💛</div>
        <div class="special-text">мне с тобой было хорошо</div>
      </div>
    </div>

    <!-- CUSTOM -->
    <div id="custom-mode" style="display:none">
      <div class="label">твоя фраза</div>
      <textarea class="custom-input" id="custom-input" rows="2" placeholder="напиши что хочется переиграть..."></textarea>
      <div class="arrow-row" id="custom-arrow"></div>
      <div class="r-hidden" id="custom-result-wrap">
        <div class="label">что за этим стояло на самом деле</div>
        <div class="phrase-box result-box" id="custom-result-box"></div>
      </div>
    </div>

    <div class="btn-wrap">
      <button class="big-button" id="main-btn" onclick="pressButton()"></button>
      <div class="btn-label">нажать кнопку</div>
      <button class="reset-btn" id="reset-btn" onclick="resetGame()">↺ ещё раз</button>
    </div>
  </div>

</div>

<div class="grass">
  <div class="grass-blades" id="blades"></div>
</div>

<script>
  // grass
  const bladesEl = document.getElementById('blades');
  for (let i = 0; i < 60; i++) {
    const b = document.createElement('div');
    b.className = 'blade';
    bladesEl.appendChild(b);
  }

  const phrases = [
    {
      original: "недотрах",
      result: "ты мне понравился, но я постаралась об этом не думать"
    },
    {
      original: "если быстро нравится — значит нарцисс или абьюзер",
      result: "меня пугает когда у меня возникает быстрая симпатия"
    },
    {
      original: "хуйня какая-то",
      result: "мне сложно это объяснить, но ты мне важна"
    },
    {
      original: "либо желание секса, либо сильная симпатия, а второе всегда плохо...",
      result: "я просто хотела чтобы ты меня понял"
    },
    { special: true }
  ];

  const customReframes = [
    "я старалась и это было честно",
    "я защищалась — и это нормально",
    "за этим словом было кое-что настоящее",
    "я сделала что могла в тот момент",
    "мне было важно это сказать",
    "я просто не нашла нужных слов"
  ];

  let idx = 0;
  let uses = 0;
  let currentMode = 'classic';

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('tab-classic').classList.toggle('active', mode === 'classic');
    document.getElementById('tab-custom').classList.toggle('active', mode === 'custom');
    document.getElementById('classic-mode').style.display = mode === 'classic' ? 'block' : 'none';
    document.getElementById('custom-mode').style.display = mode === 'custom' ? 'block' : 'none';
    resetGame();
  }

  function pressButton() {
    if (currentMode === 'classic') pressClassic();
    else pressCustom();
  }

  function pressClassic() {
    animateBtn();
    doFlash();
    spawnSparkles();
    uses++;
    document.getElementById('uses-badge').textContent = 'перемоток: ' + uses;

    const current = phrases[Math.min(idx, phrases.length - 1)];

    if (current.special) {
      document.getElementById('original-box').style.display = 'none';
      document.getElementById('arrow-row').classList.remove('visible');
      document.getElementById('result-wrap').className = 'r-hidden';
      document.getElementById('special-moment').classList.add('visible');
    } else {
      document.getElementById('original-box').style.display = '';
      document.getElementById('original-box').textContent = current.original;
      document.getElementById('original-box').classList.add('struck');
      document.getElementById('arrow-row').classList.add('visible');
      document.getElementById('result-box').textContent = current.result;
      document.getElementById('result-wrap').className = 'r-visible';
      document.getElementById('special-moment').classList.remove('visible');
    }

    document.getElementById('reset-btn').style.display = 'block';
    idx++;
    if (idx >= phrases.length) idx = 0;
  }

  function pressCustom() {
    const input = document.getElementById('custom-input').value.trim();
    if (!input) {
      document.getElementById('custom-input').classList.add('shake');
      setTimeout(() => document.getElementById('custom-input').classList.remove('shake'), 400);
      return;
    }
    animateBtn();
    doFlash();
    spawnSparkles();
    uses++;
    document.getElementById('uses-badge').textContent = 'перемоток: ' + uses;

    const r = customReframes[Math.floor(Math.random() * customReframes.length)];
    document.getElementById('custom-result-box').textContent = r;
    document.getElementById('custom-result-wrap').className = 'r-visible';
    document.getElementById('custom-arrow').classList.add('visible');
    document.getElementById('custom-arrow').textContent = '⬇️';
    document.getElementById('reset-btn').style.display = 'block';
  }

  function animateBtn() {
    const btn = document.getElementById('main-btn');
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 180);
  }

  function resetGame() {
    idx = 0;
    const p = phrases[0];
    document.getElementById('original-box').textContent = p.original;
    document.getElementById('original-box').classList.remove('struck');
    document.getElementById('original-box').style.display = '';
    document.getElementById('arrow-row').classList.remove('visible');
    document.getElementById('result-wrap').className = 'r-hidden';
    document.getElementById('special-moment').classList.remove('visible');
    document.getElementById('custom-arrow').classList.remove('visible');
    document.getElementById('custom-arrow').textContent = '';
    document.getElementById('custom-result-wrap').className = 'r-hidden';
    document.getElementById('custom-input').value = '';
    document.getElementById('reset-btn').style.display = 'none';
  }

  function doFlash() {
    const f = document.getElementById('flash');
    f.classList.add('on');
    setTimeout(() => f.classList.remove('on'), 130);
  }

  function spawnSparkles() {
    const emojis = ['✨','⚡','💫','🌟','⏱','🔄','💛'];
    for (let i = 0; i < 7; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (15 + Math.random() * 70) + 'vw';
        el.style.top = (20 + Math.random() * 55) + 'vh';
        el.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
        el.style.setProperty('--dy', (Math.random() * 120 - 60) + 'px');
        el.style.setProperty('--dr', (Math.random() * 180 - 90) + 'deg');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }, i * 65);
    }
  }
</script>
</body>
</html>
